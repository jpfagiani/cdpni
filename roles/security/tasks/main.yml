---
# ── nftables ──────────────────────────────────────────────────────────────────
- name: Instalar nftables e Fail2ban
  ansible.builtin.apt:
    name: [nftables, fail2ban, smartmontools]
    state: present

- name: Desabilitar UFW se instalado (evitar conflito)
  ansible.builtin.service:
    name: ufw
    state: stopped
    enabled: false
  ignore_errors: true

- name: Remover regras iptables legadas
  ansible.builtin.command: "{{ item }}"
  loop:
    - iptables -F
    - iptables -X
    - iptables -P INPUT ACCEPT
    - iptables -P FORWARD ACCEPT
    - iptables -P OUTPUT ACCEPT
  ignore_errors: true
  changed_when: false

- name: Implantar ruleset nftables
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0640"
  notify: reload nftables

- name: Habilitar e iniciar nftables
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

# ── Fail2ban ──────────────────────────────────────────────────────────────────
- name: Configurar Fail2ban para usar nftables como banaction
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/defaults-nftables.conf
    content: |
      [DEFAULT]
      banaction     = nftables-multiport
      banaction_allports = nftables-allports
    mode: "0644"
  notify: restart fail2ban

- name: Configurar Fail2ban — jail Samba
  ansible.builtin.template:
    src: samba-jail.conf.j2
    dest: /etc/fail2ban/jail.d/samba.conf
    mode: "0644"
  notify: restart fail2ban

- name: Configurar Fail2ban — jail Portal Flask
  ansible.builtin.template:
    src: portal-jail.conf.j2
    dest: /etc/fail2ban/jail.d/cdpni-portal.conf
    mode: "0644"
  notify: restart fail2ban

- name: Filtro Fail2ban para o portal Flask
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/cdpni-portal.conf
    content: |
      [Definition]
      failregex = .* - - \[.*\] "POST /login HTTP.* 200
    mode: "0644"
  notify: restart fail2ban

- name: Habilitar e iniciar Fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# ── S.M.A.R.T. ────────────────────────────────────────────────────────────────
- name: Configurar smartd
  ansible.builtin.copy:
    dest: /etc/smartd.conf
    content: |
      DEVICESCAN -a -o on -S on -n standby,q \
        -s (S/../.././02|L/../../6/03) \
        -m root -M exec /usr/share/smartmontools/smartd-runner
    mode: "0644"
  notify: restart smartd

- name: Habilitar smartd
  ansible.builtin.service:
    name: smartd
    state: started
    enabled: true
  ignore_errors: true

# ── SSL ───────────────────────────────────────────────────────────────────────
- name: Criar diretório SSL
  ansible.builtin.file:
    path: "{{ ssl.dir }}"
    state: directory
    mode: "0750"

- name: Gerar certificado SSL autoassinado
  ansible.builtin.command: >
    openssl req -x509 -nodes -days {{ ssl.days }} -newkey rsa:2048
      -keyout {{ ssl.key }}
      -out    {{ ssl.cert }}
      -subj   "/C={{ ssl.country }}/ST={{ ssl.state }}/O={{ ssl.org }}/CN={{ server.domain }}"
      -addext "subjectAltName=DNS:{{ server.domain }},DNS:{{ server.hostname }},IP:{{ server.ip }}"
  args:
    creates: "{{ ssl.cert }}"
  notify: copy ca to webroot

- name: Proteger chave privada
  ansible.builtin.file:
    path: "{{ ssl.key }}"
    mode: "0600"

  - name: reload nftables
  - name: reload nftables
    ansible.builtin.service:
    ansible.builtin.service:
      name: nftables
      name: nftables
      state: reloaded
      state: reloaded
  - name: restart fail2ban
  - name: restart fail2ban
    ansible.builtin.service:
    ansible.builtin.service:
      name: fail2ban
      name: fail2ban
      state: restarted
      state: restarted
  - name: restart smartd
  - name: restart smartd
    ansible.builtin.service:
    ansible.builtin.service:
      name: smartd
      name: smartd
      state: restarted
      state: restarted
    ignore_errors: true
    ignore_errors: true
  - name: copy ca to webroot
  - name: copy ca to webroot
    ansible.builtin.copy:
    ansible.builtin.copy:
      src: "{{ ssl.cert }}"
      src: "{{ ssl.cert }}"
      dest: /var/www/html/cdpni-ca.crt
      dest: /var/www/html/cdpni-ca.crt
      remote_src: true
      remote_src: true
      mode: "0644"
      mode: "0644"
