---
- name: Instalar PHP 8.3 e Nginx
  ansible.builtin.apt:
    name:
      - nginx
      - php8.3-fpm
      - php8.3-cli
      - php8.3-common
    state: present

- name: Criar diretório do painel
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0750"
  loop:
    - "{{ panel.dir }}"
    - "{{ panel.dir }}/public"
    - "{{ panel.dir }}/public/api"

- name: Gerar config.php do painel
  ansible.builtin.template:
    src: config.php.j2
    dest: "{{ panel.dir }}/config.php"
    owner: www-data
    group: www-data
    mode: "0640"
  notify: restart php-fpm

- name: Copiar API PHP
  ansible.builtin.copy:
    src: api.php
    dest: "{{ panel.dir }}/public/api/index.php"
    owner: www-data
    group: www-data
    mode: "0640"

- name: Copiar frontend HTML/JS
  ansible.builtin.copy:
    src: index.php
    dest: "{{ panel.dir }}/public/index.php"
    owner: www-data
    group: www-data
    mode: "0640"

- name: Criar log do painel
  ansible.builtin.file:
    path: /var/log/samba_panel.log
    state: touch
    owner: www-data
    group: www-data
    mode: "0664"

- name: Configurar sudoers para www-data (painel)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/samba-panel
    content: |
      www-data ALL=(ALL) NOPASSWD: \
        /usr/bin/smbpasswd, /usr/sbin/useradd, /usr/sbin/usermod, \
        /usr/sbin/userdel, /usr/bin/gpasswd, /usr/sbin/groupadd, \
        /usr/sbin/groupdel, /bin/mkdir, /usr/bin/mkdir, \
        /bin/chown, /usr/bin/chown, /bin/chmod, /usr/bin/chmod, \
        /usr/bin/pdbedit, /usr/sbin/testparm, \
        /usr/bin/systemctl restart smbd, \
        /usr/bin/systemctl reload smbd, \
        /usr/bin/systemctl status smbd, \
        /usr/bin/passwd, /usr/bin/smbstatus, /usr/sbin/chpasswd
    validate: visudo -cf %s
    mode: "0440"

- name: Configurar Nginx — painel admin (8443)
  ansible.builtin.template:
    src: nginx-panel.conf.j2
    dest: /etc/nginx/sites-available/samba-panel
    mode: "0644"
  notify: reload nginx

- name: Ativar site do painel
  ansible.builtin.file:
    src: /etc/nginx/sites-available/samba-panel
    dest: /etc/nginx/sites-enabled/samba-panel
    state: link
  notify: reload nginx

- name: Remover site default do Nginx
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Habilitar PHP-FPM e Nginx
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: [php8.3-fpm, nginx]

handlers:
  - name: restart php-fpm
    ansible.builtin.service:
      name: php8.3-fpm
      state: restarted

  - name: reload nginx
    ansible.builtin.service:
      name: nginx
      state: reloaded
