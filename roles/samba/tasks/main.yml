---
- name: Carregar variáveis do Samba
  ansible.builtin.include_vars: main.yml

- name: Instalar Samba
  ansible.builtin.apt:
    name: [samba, samba-common-bin, smbclient]
    state: present

# ── Grupos ────────────────────────────────────────────────────────────────────

- name: Criar grupos dos compartilhamentos
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
    state: present
  loop: "{{ samba_groups }}"

# ── Usuários por compartilhamento ─────────────────────────────────────────────

- name: Criar usuário Linux por compartilhamento
  ansible.builtin.user:
    name: "{{ item.user | default(item.name | lower) }}"
    comment: "{{ item.name | replace('_', ' ') }}"
    shell: /usr/sbin/nologin
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    create_home: false
    password: "{{ samba.default_pass | password_hash('sha512') }}"
  loop: "{{ samba_shares }}"
  no_log: true

- name: Registrar usuários dos compartilhamentos no Samba
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ samba.default_pass }}' '{{ samba.default_pass }}' \
      | smbpasswd -s -a {{ item.user | default(item.name | lower) }} 2>/dev/null || true
    smbpasswd -e {{ item.user | default(item.name | lower) }} 2>/dev/null || true
  loop: "{{ samba_shares }}"
  changed_when: false
  no_log: true

# ── Usuários operacionais (admin + supervisao) ─────────────────────────────────

- name: Criar usuário administrador do servidor
  ansible.builtin.user:
    name: "{{ server.admin_user }}"
    comment: "Administrador CDPNI"
    shell: /usr/sbin/nologin
    groups: "{{ samba_all_groups | join(',') }}"
    append: false
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
  no_log: true

- name: Criar usuários operacionais (jpfagiani, rcborges, cpd, supervisao)
  ansible.builtin.user:
    name: "{{ item.login }}"
    comment: "{{ item.fullname }}"
    shell: /usr/sbin/nologin
    group: "{{ item.primary }}"
    groups: "{{ item.groups }}"
    append: false
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
  loop: "{{ samba_users }}"
  no_log: true

- name: Registrar admin do servidor no Samba
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ samba.default_pass }}' '{{ samba.default_pass }}' \
      | smbpasswd -s -a {{ server.admin_user }} 2>/dev/null || true
    smbpasswd -e {{ server.admin_user }} 2>/dev/null || true
  changed_when: false
  no_log: true

- name: Registrar usuários operacionais no Samba
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ samba.default_pass }}' '{{ samba.default_pass }}' \
      | smbpasswd -s -a {{ item.login }} 2>/dev/null || true
    smbpasswd -e {{ item.login }} 2>/dev/null || true
  loop: "{{ samba_users }}"
  changed_when: false
  no_log: true

# ── Diretórios ─────────────────────────────────────────────────────────────────

- name: Criar diretórios dos compartilhamentos (0777 — controle via Samba)
  ansible.builtin.file:
    path: "{{ raid.mount }}/shares/{{ item.name }}"
    state: directory
    owner: "{{ item.user | default(item.name | lower) }}"
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    mode: "0777"
  loop: "{{ samba_shares }}"

- name: Criar lixeiras pessoais dos usuários operacionais
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ item.login }}"
    state: directory
    mode: "0700"
    owner: "{{ item.login }}"
    group: "{{ item.primary }}"
  loop: "{{ samba_users }}"

- name: Criar lixeira do admin do servidor
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ server.admin_user }}"
    state: directory
    mode: "0700"
    owner: "{{ server.admin_user }}"

# ── smb.conf ──────────────────────────────────────────────────────────────────

- name: Fazer backup do smb.conf original
  ansible.builtin.copy:
    src: /etc/samba/smb.conf
    dest: "/etc/samba/smb.conf.bak.{{ ansible_date_time.epoch }}"
    remote_src: true
    mode: "0644"
  ignore_errors: true

- name: Gerar smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    validate: "testparm -s %s"
  notify:
    - restart samba

- name: Habilitar e iniciar Samba
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: [smbd, nmbd]
